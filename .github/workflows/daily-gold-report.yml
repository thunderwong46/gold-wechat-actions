name: Gold WeChat Reports

on:
  workflow_dispatch:
    inputs:
      mode:
        description: "daily or weekly"
        required: false
        default: "daily"

permissions:
  contents: write

jobs:
  send-report:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Generate and send report
        env:
          SERVERCHAN_SENDKEY: ${{ secrets.SERVERCHAN_SENDKEY }}
          TWELVE_DATA_API_KEY: ${{ secrets.TWELVE_DATA_API_KEY }}
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          REPORT_MODE: ${{ github.event.inputs.mode || 'daily' }}
        run: python scripts/gold_report.py

      - name: Commit report archive
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add reports data reviews
          if git diff --cached --quiet; then
            echo "No report archive changes to commit."
          else
            git commit -m "Archive gold report data"
            git push
          fi
